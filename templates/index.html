<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PiedPiper</title>
    <link rel="stylesheet" href="/static/style.css?v=2">
    <link rel="stylesheet" href="/static/css/knowledge.css?v=2">
    <link rel="stylesheet" href="/static/css/editor.css?v=2">
    <link rel="stylesheet" href="/static/css/vocabulary.css?v=2">
    <link rel="stylesheet" href="/static/css/yki.css?v=2">
    <!-- Quill.js Rich Text Editor -->
    <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
</head>
<body>
    <div class="app-layout">
        <nav class="sidebar">
            <div class="sidebar-header">
                <h1 class="logo">PiedPiper</h1>
                <span class="logo-sub">Swedish Language Learning & YKI Prep</span>
            </div>

            <div class="nav-section">
                <div class="nav-label">Tools</div>
                <a href="#/" class="nav-link active">
                    <span class="nav-icon">&#9835;</span>
                    <span>Text to Speech</span>
                </a>
                <a href="#/editor" class="nav-link">
                    <span class="nav-icon">&#9998;</span>
                    <span>Writing Editor</span>
                </a>
                <a href="#/vocabulary" class="nav-link">
                    <span class="nav-icon">&#128218;</span>
                    <span>Vocabulary</span>
                </a>
            </div>

            <div class="nav-section">
                <div class="nav-label">YKI Exam</div>
                <a href="#/yki" class="nav-link">
                    <span class="nav-icon">&#127891;</span>
                    <span>Dashboard</span>
                </a>
                <a href="#/yki/reading" class="nav-link">
                    <span class="nav-icon">&#128214;</span>
                    <span>Reading</span>
                </a>
                <a href="#/yki/writing" class="nav-link">
                    <span class="nav-icon">&#128221;</span>
                    <span>Writing</span>
                </a>
                <a href="#/yki/listening" class="nav-link">
                    <span class="nav-icon">&#127911;</span>
                    <span>Listening</span>
                </a>
                <a href="#/yki/speaking" class="nav-link">
                    <span class="nav-icon">&#127908;</span>
                    <span>Speaking</span>
                </a>
            </div>

            <div class="nav-section">
                <div class="nav-label">Manage</div>
                <a href="#/knowledge" class="nav-link">
                    <span class="nav-icon">&#128194;</span>
                    <span>Knowledge Base</span>
                </a>
                <a href="#/settings" class="nav-link">
                    <span class="nav-icon">&#9881;</span>
                    <span>Settings</span>
                </a>
            </div>
        </nav>

        <main class="main-content">
            <div id="view-container" class="view-container">
                <div class="loading-state">Loading...</div>
            </div>
        </main>
    </div>

    <!-- Quill.js -->
    <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>

    <!-- App Scripts (v2 cache bust) -->
    <script src="/static/js/utils.js?v=2"></script>
    <script src="/static/js/api.js?v=2"></script>
    <script src="/static/js/timer.js?v=2"></script>
    <script src="/static/js/audio-recorder.js?v=2"></script>
    <script src="/static/js/tts.js?v=2"></script>
    <script src="/static/js/knowledge.js?v=2"></script>
    <script src="/static/js/editor.js?v=2"></script>
    <script src="/static/js/vocabulary.js?v=2"></script>
    <script src="/static/js/yki.js?v=2"></script>
    <script src="/static/js/yki-reading.js?v=2"></script>
    <script src="/static/js/yki-writing.js?v=2"></script>
    <script src="/static/js/yki-listening.js?v=2"></script>
    <script src="/static/js/yki-speaking.js?v=2"></script>
    <script src="/static/js/router.js?v=2"></script>
    <script>
        Router.register('#/', { partial: 'tts.html', init: initTtsView });
        Router.register('#/editor', { partial: 'editor.html', init: initEditorView });
        Router.register('#/vocabulary', { partial: 'vocabulary.html', init: initVocabularyView });
        Router.register('#/yki', { partial: 'yki_home.html', init: initYkiHomeView });
        Router.register('#/yki/reading', { partial: 'yki_reading.html', init: initYkiReadingView });
        Router.register('#/yki/writing', { partial: 'yki_writing.html', init: initYkiWritingView });
        Router.register('#/yki/listening', { partial: 'yki_listening.html', init: initYkiListeningView });
        Router.register('#/yki/speaking', { partial: 'yki_speaking.html', init: initYkiSpeakingView });
        Router.register('#/knowledge', { partial: 'knowledge.html', init: initKnowledgeView });
        Router.register('#/settings', { partial: 'settings.html', init: () => ({}) });

        Router.init('view-container');
    </script>
</body>
</html>

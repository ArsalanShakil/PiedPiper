<section class="panel">
    <h2>Text to Speech</h2>

    <div class="form-group">
        <label for="tts-text-input">Text</label>
        <textarea id="tts-text-input" rows="6" placeholder="Skriv din svenska text h&auml;r..."></textarea>
        <div class="char-count"><span id="tts-char-count">0</span> characters</div>
    </div>

    <div class="form-group">
        <label for="tts-voice-select">Voice</label>
        <select id="tts-voice-select"></select>
    </div>

    <div class="actions" style="display:flex;gap:10px;">
        <button id="tts-listen-btn" class="btn btn-primary" style="flex:1;">
            <span class="btn-text">Listen</span>
            <span class="btn-loading" style="display:none;">Generating...</span>
        </button>
        <button id="tts-save-toggle" class="btn" style="flex-shrink:0;">Save to File &darr;</button>
    </div>

    <div id="tts-listen-player" style="display:none;margin-top:16px;">
        <audio id="tts-listen-audio" controls style="width:100%;"></audio>
    </div>

    <!-- Save options (collapsed by default) -->
    <div id="tts-save-section" style="display:none;margin-top:20px;padding-top:20px;border-top:1px solid var(--border-light);">
        <div class="form-row">
            <div class="form-group">
                <label for="tts-format-select">Format</label>
                <select id="tts-format-select">
                    <option value="wav">WAV (lossless)</option>
                    <option value="mp3">MP3</option>
                    <option value="ogg">OGG Vorbis</option>
                    <option value="flac">FLAC</option>
                </select>
            </div>
            <div class="form-group">
                <label for="tts-filename-input">Filename <span class="optional">(optional)</span></label>
                <input type="text" id="tts-filename-input" placeholder="Auto-generated if empty">
            </div>
        </div>

        <div class="form-group">
            <label>Save to</label>
            <div class="save-location">
                <select id="tts-quick-folder"></select>
                <span class="save-or">or</span>
                <button id="tts-browse-btn" class="btn btn-small">Browse...</button>
            </div>
            <div class="current-path" id="tts-current-save-path"></div>
        </div>

        <div class="actions">
            <button id="tts-generate-btn" class="btn btn-primary">
                <span class="btn-text">Save Speech to File</span>
                <span class="btn-loading" style="display:none;">Saving...</span>
            </button>
        </div>
    </div>

    <div id="tts-result-area" style="display:none;">
        <div class="result-card">
            <div class="result-info">
                <span id="tts-result-filename" class="result-name"></span>
                <span id="tts-result-size" class="result-size"></span>
            </div>
            <div id="tts-result-path" class="result-path"></div>
            <audio id="tts-result-audio" controls></audio>
        </div>
    </div>
</section>

<section class="panel">
    <div class="files-header">
        <h2>Saved Files</h2>
        <div class="filter-row">
            <select id="tts-filter-folder">
                <option value="">All Folders</option>
            </select>
        </div>
    </div>
    <div id="tts-files-list" class="files-list">
        <p class="empty-state">No files yet.</p>
    </div>
</section>

<!-- Folder Browser Modal -->
<div id="tts-browser-overlay" class="modal-overlay" style="display:none;">
    <div class="modal modal-browser">
        <h3>Choose Save Folder</h3>
        <div class="browser-path-bar">
            <button id="tts-browser-up" class="btn btn-small">&uarr;</button>
            <input type="text" id="tts-browser-path-input" class="browser-path-input" placeholder="/path/to/folder">
            <button id="tts-browser-go" class="btn btn-small">Go</button>
        </div>
        <div id="tts-browser-list" class="browser-list"></div>
        <div class="modal-actions">
            <button id="tts-browser-cancel" class="btn">Cancel</button>
            <button id="tts-browser-select" class="btn btn-primary">Select This Folder</button>
        </div>
    </div>
</div>
